<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Video</title>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>

<body>
<video id="player" controls autoplay playsinline preload="auto"></video>

<script>
"use strict";

const player = document.getElementById("player");
const FALLBACK_TIMEOUT_MS = 10000;

function decodeVideoUrl(value) {
    if (!value) {
        throw new Error("Missing video URL.");
    }

    let normalized = value
        .replace(/-/g, "+")
        .replace(/_/g, "/")
        .replace(/ /g, "+");

    normalized += "=".repeat((4 - normalized.length % 4) % 4);

    const binary = atob(normalized);
    const bytes = Uint8Array.from(
        binary,
        character => character.charCodeAt(0)
    );

    const decoded = new TextDecoder("utf-8", { fatal: true }).decode(bytes);
    const parsed = new URL(decoded);

    if (parsed.protocol !== "https:") {
        throw new Error("Unsupported video URL.");
    }

    const hostname = parsed.hostname.toLowerCase();

    if (
        hostname !== "truthsocial.com" &&
        !hostname.endsWith(".truthsocial.com")
    ) {
        throw new Error("Unsupported video host.");
    }

    return parsed.href;
}

try {
    const params = new URLSearchParams(window.location.search);
    const mediaUrl = decodeVideoUrl(params.get("v"));

    let redirected = false;
    let fallbackTimer = null;

    const clearFallbackTimer = () => {
        if (fallbackTimer !== null) {
            clearTimeout(fallbackTimer);
            fallbackTimer = null;
        }
    };

    const openDirectly = () => {
        if (redirected) {
            return;
        }

        redirected = true;
        clearFallbackTimer();
        window.location.replace(mediaUrl);
    };

    const source = document.createElement("source");
    source.src = mediaUrl;
    source.type = "video/mp4";

    source.addEventListener("error", openDirectly, { once: true });
    player.addEventListener("error", openDirectly, { once: true });

    // If the browser can decode and buffer the stream, keep the embedded player.
    player.addEventListener("canplay", clearFallbackTimer, { once: true });
    player.addEventListener("playing", clearFallbackTimer, { once: true });

    player.appendChild(source);

    // Some browsers hang on an unsuitable source without firing an error.
    // Redirect seamlessly to the direct media URL after 10 seconds.
    fallbackTimer = setTimeout(openDirectly, FALLBACK_TIMEOUT_MS);

    player.load();
    player.play().catch(() => {
        // Autoplay may be blocked; controls remain available.
        // The canplay event still prevents an unnecessary redirect.
    });
} catch (_error) {
    document.documentElement.innerHTML = "";
}
</script>
</body>
</html>
